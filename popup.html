<!-- popup.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SteamBuddy</title>
  <script src="popup.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    .toggle-checkbox:checked + .toggle-bg {
      background-color: #60a5fa; /* Hellblau für "An" */
    }
    .toggle-checkbox:checked ~ .toggle-knob {
      transform: translateX(1.25rem); /* Verschiebung für "An" */
    }
    .toggle-bg {
      transition: background-color 0.2s ease-in-out;
    }
    .toggle-knob {
      transition: transform 0.2s ease-in-out;
    }
  </style>
</head>
<body class="bg-gray-900 font-sans">
  <div class="w-64 p-4 bg-gray-800 rounded-lg shadow-lg">
    <div class="flex items-center mb-4">
      <img id="statusIcon" src="OIS-active.png" alt="Status Icon" class="w-8 h-8 mr-2">
      <h1 class="text-lg font-bold text-gray-100">SteamBuddy</h1>
    </div>
    
    <!-- Redirect-Toggle -->
    <div class="flex items-center justify-between mb-4">
      <span id="toggleLabel" class="text-sm font-medium text-gray-300">Deactivate</span>
      <label class="relative inline-flex items-center cursor-pointer">
        <input id="toggleRedirect" type="checkbox" class="sr-only toggle-checkbox">
        <div class="toggle-bg w-10 h-6 bg-gray-600 rounded-full"></div>
        <div class="toggle-knob absolute w-4 h-4 bg-gray-200 rounded-full top-1 left-1"></div>
      </label>
    </div>

     <!-- Steam Reviews-Toggle -->
    <div class="flex items-center justify-between mb-4">
      <span id="reviewToggleLabel" class="text-sm font-medium text-gray-300">Steam Reviews Off</span>
      <label class="relative inline-flex items-center cursor-pointer">
        <input id="toggleReviewBadge" type="checkbox" class="sr-only toggle-checkbox">
        <div class="toggle-bg w-10 h-6 bg-gray-600 rounded-full"></div>
        <div class="toggle-knob absolute w-4 h-4 bg-gray-200 rounded-full top-1 left-1"></div>
      </label>
    </div>
    
    <button id="freeGamesButton" class="w-full py-2 px-4 bg-blue-600 text-gray-100 rounded-md hover:bg-blue-700 transition duration-200">
      Check for Free Games & DLCs
    </button>

    <button id="helpButton" class="w-full py-2 px-4 bg-purple-600 text-gray-100 rounded-md hover:bg-purple-700 transition duration-200 mt-2">
      Help & Features
    </button>
  </div>
</body>
</html>
